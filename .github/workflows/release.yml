name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  Release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      # The image build compiles the frontend itself; this only adds the checks
      # it does not run.
      - name: Check frontend
        working-directory: app
        run: |
          bun run lint
          bun run typecheck

      # Regenerates src/generated/inochi-wordmark.ts so the image ships a
      # freshly stamped wordmark. Must precede the build, which copies it in.
      - name: Generate logo assets
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-tools libavif-bin
          app/scripts/generate-inochi-assets.sh

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/inochi
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.date.outputs.date }}
            GIT_SHA=${{ github.sha }}
